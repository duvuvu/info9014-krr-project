services:
  fuseki:
    image: secoresearch/fuseki
    container_name: cineexplorer-fuseki
    restart: always
    environment:
      ADMIN_PASSWORD: admin
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data:/fuseki-base
      - ../output:/staging/output:ro
      - ../ontology:/staging/ontology:ro

  brwsr:
    image: clariah/brwsr:latest
    container_name: cineexplorer-brwsr
    restart: always
    ports:
      - "5000:5000"
    environment:
      - SPARQL_ENDPOINT=http://host.docker.internal:3030/cineexplorer/query
      - DEFAULT_BASE=http://cineexplorer.local
      - LOCAL_SERVER_NAME=http://cineexplorer.local
      - START_LOCAL_NAME=data/person/nm0000102
      - CACHE_TIMEOUT=0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - fuseki

volumes:
  fuseki_data:

# ── Usage ─────────────────────────────────────────────────────
#
# 1. Start all services:
#      cd deployment && docker compose up -d
#
# 2. Create Fuseki dataset (once):
#      curl -u admin:admin -X POST http://localhost:3030/$/datasets \
#        -d "dbName=cineexplorer&dbType=tdb2"
#
# 3. Load ontology:
#      curl -u admin:admin -X POST http://localhost:3030/cineexplorer/data \
#        --data-binary @../ontology/cineexplorer_ontology.ttl \
#        -H "Content-Type: text/turtle"
#
# 4. Load KG:
#      curl -u admin:admin -X POST http://localhost:3030/cineexplorer/data \
#        --data-binary @../output/cineexplorer_kg.ttl \
#        -H "Content-Type: text/turtle"
#
# 5. SPARQL endpoint:   http://localhost:3030/cineexplorer/query
#    Fuseki web UI:     http://localhost:3030
#    Brwsr (LD browser): http://localhost:5000
#
# ── Ports ─────────────────────────────────────────────────────
# 3030  Apache Fuseki SPARQL endpoint + admin UI
# 5000  Brwsr Linked Data browser
#
# ── Note ──────────────────────────────────────────────────────
# Separate from database/docker-compose.yml (MySQL port 3307).
# MySQL is needed only when running the R2RML mapping.
# Fuseki + Brwsr are needed for SPARQL querying and Linked Data browsing.
#
# On Linux, extra_hosts: host.docker.internal:host-gateway ensures
# the Brwsr container can reach Fuseki on the Docker host.
